apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: servi-fleet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: servi-frontend:latest
        imagePullPolicy: Never  # 로컬 이미지 사용
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: servi-fleet
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer  # 로컬에서는 NodePort로 접근