apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: servi-fleet
data:
  DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/servi_db
  REDIS_URL: redis://redis:6379
  DEBUG: "True"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: servi-fleet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: servi-backend:latest
        imagePullPolicy: Never  # 로컬 이미지 사용
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: servi-fleet
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP