version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: servi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: servi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - servi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: servi-redis
    ports:
      - "6379:6379"
    networks:
      - servi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servi-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/servi_db
      REDIS_URL: redis://redis:6379
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - servi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: servi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - servi-network

volumes:
  postgres_data:

networks:
  servi-network:
    driver: bridge
