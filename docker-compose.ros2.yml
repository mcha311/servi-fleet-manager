version: "3.9"
services:
  ros2-bridge:
    build:
      context: ./ros2_bridge
      dockerfile: Dockerfile
    image: servi-ros2-bridge:latest
    container_name: servi-ros2-bridge
    environment:
      - FASTAPI_WS_URL=ws://backend:8000/ws/ros2
      - ROBOT_NAMESPACE=/robot
      - ROBOT_IDS=robot_01,robot_02
      - BRIDGE_LOG_LEVEL=INFO
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    networks:
      - servi-network
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./ros2_bridge/cyclone_dds.xml:/cyclone_dds.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "source /opt/ros/jazzy/setup.bash && ros2 node list | grep -q servi_bridge_node || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  servi-network:
    driver: bridge